import org.jetbrains.kotlin.gradle.dsl.JvmTarget
import org.jetbrains.kotlin.gradle.tasks.KotlinJvmCompile
import org.jlleitschuh.gradle.ktlint.reporter.ReporterType

// Pin build-tooling transitives (axion-release, dokka, cyclonedx) to patched versions to clear OSV advisories.
buildscript {
    repositories {
        mavenCentral()
    }
    configurations.classpath {
        resolutionStrategy.eachDependency { details ->
            if (details.requested.group == 'org.bouncycastle') {
                details.useVersion '1.84'
            }
            if (details.requested.group == 'com.fasterxml.jackson.core' && details.requested.name == 'jackson-core') {
                details.useVersion '2.21.1'
            }
            if (details.requested.group == 'org.codehaus.plexus' && details.requested.name == 'plexus-utils') {
                details.useVersion '3.6.1'
            }
        }
    }
}

plugins {
    id 'com.vanniktech.maven.publish'
    id 'jacoco-report-aggregation'
    id 'org.jetbrains.dokka'
    id 'org.jetbrains.kotlin.jvm'
    id 'org.jetbrains.kotlin.plugin.serialization' apply false
    id 'org.jlleitschuh.gradle.ktlint'
    id 'org.sonarqube'
    id 'pl.allegro.tech.build.axion-release'
    id 'org.cyclonedx.bom' version '3.2.4'
}

repositories {
    mavenCentral()
}

dependencies {
    implementation project(':music-commons-api')
    implementation project(':music-commons-core')
    implementation project(':music-commons-fx')
    implementation project(':music-commons-test')
    implementation project(':music-commons-media')
    api libs.kotlin.stdlib.get()

    // Aggregated Dokka HTML site — published library modules only (test utility modules excluded)
    dokka project(':music-commons-api')
    dokka project(':music-commons-core')
    dokka project(':music-commons-fx')
    dokka project(':music-commons-media')
}

dokka {
    dokkaPublications.html {
        moduleName = 'Music Commons'
    }
}

kotlin {
    jvmToolchain(21)
}

tasks.named('jar').configure {
    enabled = false
}

scmVersion {
    tag {
        prefix = ''
        initialVersion { t, p -> '0.1.0' }
    }
    useHighestVersion = true
    ignoreUncommittedChanges = false
    versionIncrementer((project.findProperty('versionIncrement') ?: 'incrementMinor') as String)

    checks {
        uncommittedChanges = false
        aheadOfRemote = false
    }
}

tasks.withType(PublishToMavenLocal).configureEach {
    onlyIf { project != rootProject }
}

version = scmVersion.version
description = 'A reactive library for managing audio files, playlists and waveforms'

sonar {
    properties {
        property 'sonar.host.url', 'https://sonarcloud.io'
        property 'sonar.organization', 'transgressoft'
        property 'sonar.projectKey', 'octaviospain_music-commons'
        property 'sonar.projectName', 'music-commons'
        property 'sonar.projectVersion', version
        property 'sonar.junit.reportPaths', 'build/test-results/test'
        property 'sonar.inclusions', [
                '**/music-commons-api/src/main/**',
                '**/music-commons-core/src/main/**',
                '**/music-commons-fx/src/main/**',
                '**/music-commons-media/src/main/**'
        ]
        property 'sonar.test.exclusions', '**/test/**'
        def buildDir = project.layout.buildDirectory.get().asFile.absolutePath
        property 'sonar.coverage.jacoco.xmlReportPaths', "${buildDir}/reports/jacoco/testCodeCoverageReport/testCodeCoverageReport.xml"
    }
}

tasks.named('check') {
    dependsOn tasks.named('testCodeCoverageReport', JacocoReport)
}

/**
 * Regenerates the dependency-verification ledger from a clean slate so stale/superseded artifact entries are pruned.
 *
 * Gradle merges `--write-verification-metadata` output into the existing `gradle/verification-metadata.xml` file,
 * so an append-then-prune approach leaves stale entries in place. Emptying only the `<components>` element first
 * (while preserving `<configuration>`, including `verify-metadata` and `trusted-artifacts`) guarantees the
 * resulting ledger contains exactly the currently-resolved set — nothing more, nothing less.
 *
 * Run with: `gradle regenerateVerificationMetadata`
 */
tasks.register('regenerateVerificationMetadata', Exec) {
    group = 'verification'
    description = 'Regenerates the dependency-verification ledger from a clean slate so stale/superseded artifact entries are pruned.'

    doFirst {
        def xmlFile = rootProject.file('gradle/verification-metadata.xml')
        if (!xmlFile.exists()) {
            logger.lifecycle('verification-metadata.xml not found — skipping component clear.')
            return
        }
        def content = xmlFile.text
        // Remove all children of <components> while leaving the element itself, then replace with empty tag.
        // This preserves the <configuration> block (verify-metadata / trusted-artifacts) intact.
        def cleared = content.replaceAll(/(?s)<components>.*?<\/components>/, '<components/>')
        xmlFile.text = cleared
        logger.lifecycle('Cleared <components> in verification-metadata.xml; <configuration> block preserved.')
    }

    commandLine 'gradle', 'clean', 'build', 'cyclonedxBom', 'dokkaGenerate',
            '--write-verification-metadata', 'sha256',
            '--refresh-dependencies',
            '--no-parallel'
}

allprojects {
    repositories {
        mavenCentral()
        maven { url = 'https://jitpack.io' }
    }

    tasks.cyclonedxDirectBom {
        includeConfigs = ['runtimeClasspath']
        skipConfigs = ['compileClasspath', 'testCompileClasspath', 'testRuntimeClasspath']
    }

    // The ktlint and dokka plugins resolve their engines into dedicated build-tooling configurations
    // (`ktlint`, `dokka*Resolver~internal`) that bypass the buildscript classpath pins above, dragging in
    // vulnerable logback (ktlint SLF4J backend) and jackson-core (ktlint JSON reporter / dokka runtime).
    // Force the patched versions in those configurations so the OSV advisories are cleared for the whole tree.
    configurations.matching { it.name == 'ktlint' || it.name.startsWith('dokka') }.configureEach {
        resolutionStrategy.eachDependency { details ->
            if (details.requested.group == 'ch.qos.logback') {
                details.useVersion '1.5.34'
                details.because 'CVE-2024-12798/-12801, CVE-2025-11226, CVE-2026-1225 — ktlint engine pulls vulnerable logback 1.3.14'
            }
            if (details.requested.group == 'com.fasterxml.jackson.core' && details.requested.name == 'jackson-core') {
                details.useVersion '2.21.1'
                details.because 'GHSA-72hv-8253-57qq — ktlint/dokka engines pull vulnerable jackson-core 2.15.3'
            }
        }
    }
}

subprojects {

    apply plugin: 'com.vanniktech.maven.publish'
    apply plugin: 'jacoco'
    apply plugin: 'kotlin'
    apply plugin: 'maven-publish'
    apply plugin: 'org.jetbrains.dokka'
    apply plugin: 'org.jetbrains.kotlin.plugin.serialization'
    apply plugin: 'org.jlleitschuh.gradle.ktlint'
    apply plugin: 'org.sonarqube'

    group = 'net.transgressoft'
    project.version = rootProject.version

    dependencies {
        implementation platform(libs.kotlin.bom.get())
        api platform(libs.coroutines.bom.get())
        api libs.kotlin.stdlib.get()
        api libs.lirp.api.get()

        implementation libs.nv.i18n.get()
        implementation libs.kotlin.logging.get()
        implementation libs.kotlinx.serialization.json.get()

        testImplementation libs.logback.core.get()
        testRuntimeOnly libs.logback.classic.get()
    }

    afterEvaluate {
        tasks.named('generateMetadataFileForMavenPublication') {
            dependsOn tasks.named('dokkaJavadocJar')
        }
    }

    kotlin {
        jvmToolchain(21)
    }

    tasks.withType(KotlinJvmCompile).configureEach {
        compilerOptions {
            jvmTarget.set(JvmTarget.JVM_21)
            freeCompilerArgs.add('-Xjsr305=strict')
        }
    }

    sonar {
        properties {
            property 'sonar.moduleKey', "${project.name}"
            property 'sonar.sources', 'src/main'
            property 'sonar.exclusions', 'src/test/**'
            property 'sonar.coverage.jacoco.xmlReportPaths',
                    "${rootProject.layout.buildDirectory.get().asFile.absolutePath}/reports/jacoco/testCodeCoverageReport/testCodeCoverageReport.xml"
        }
    }

    ktlint {
        reporters {
            reporter(ReporterType.HTML)
        }
    }

    // Cross-platform test tag filtering. See CONTRIBUTING.md "Cross-Platform Testing".
    //
    //   Tag                Purpose                                       Default
    //   linux-only         Needs Linux-JDK path semantics                Included
    //   posix-only         Needs POSIX (chmod, /tmp semantics)           Included
    //   windows-only       Needs real Windows host                       EXCLUDED
    //   requires-playback  Needs a working audio output device           Included
    //
    //   -PexcludeLinuxOnly=true     skip linux-only tests   (use on macOS, Windows)
    //   -PexcludePosixOnly=true     skip posix-only tests   (use on Windows)
    //   -PincludeWindowsOnly=true   un-skip windows-only    (use on Windows)
    //   -PexcludePlaybackTests=true skip requires-playback  (use on headless CI)
    //
    // configureEach (not just `test { … }`) so any future or custom Test task in a subproject
    // — integration suites, split runs — gets the same JVM args and tag filtering.
    tasks.withType(Test).configureEach {
        useJUnitPlatform()
        jvmArgs '-XX:+EnableDynamicAgentLoading'
        maxHeapSize = '2g'
        testLogging {
            events 'passed', 'skipped', 'failed'
        }

        def excludeTags = ['windows-only']
        if (project.findProperty('includeWindowsOnly')?.toString()?.toBoolean()) excludeTags.remove('windows-only')
        if (project.findProperty('excludeLinuxOnly')?.toString()?.toBoolean()) excludeTags << 'linux-only'
        if (project.findProperty('excludePosixOnly')?.toString()?.toBoolean()) excludeTags << 'posix-only'
        if (project.findProperty('excludePlaybackTests')?.toString()?.toBoolean()) excludeTags << 'requires-playback'
        if (!excludeTags.isEmpty()) {
            systemProperty 'kotest.tags.exclude', excludeTags.join(',')
        }
    }

    jacocoTestReport {
        reports {
            xml.required.set true
            html.required = true
        }
    }

    mavenPublishing {
        publishToMavenCentral()
        coordinates("${project.group}", "${project.name}", "${project.version}")
        pom {
            name = "${project.name}"
            description = project.description
            url = 'https://github.com/octaviospain/music-commons'
            inceptionYear = '2025'

            licenses {
                license {
                    name = 'GNU General Public License v3'
                    url = 'https://www.gnu.org/licenses/gpl-3.0.en.html'
                }
            }

            developers {
                developer {
                    id = 'transgressoft'
                    name = 'Octavio Calleya Garcia'
                    email = 'octavio@transgressoft.net'
                    organization = 'transgressoft'
                    organizationUrl = 'https://transgressoft.net'
                }
            }

            scm {
                connection = 'scm:git:git://github.com/octaviospain/music-commons.git'
                developerConnection = 'scm:git:ssh://github.com:octaviospain/music-commons.git'
                url = 'https://github.com/octaviospain/music-commons/tree/main'
            }
        }
        signAllPublications()
    }
}
