name: master build

on:
    push:
        branches:
            - main
        paths-ignore:
            - "**.md"
            - '.gitignore'
            - 'docs/**'

jobs:
    build-analyze:
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, windows-latest]

        steps:
            -   uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
                with:
                    fetch-depth: 0

            -   name: Set up JDK 21
                uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
                with:
                    java-version: 21
                    distribution: 'liberica'
                    java-package: 'jdk+fx'

            -   name: Install dependencies (Linux)
                if: matrix.os == 'ubuntu-latest'
                run: |
                    sudo apt-get update
                    sudo apt-get install -y \
                      libgstreamer1.0-0 \
                      gstreamer1.0-plugins-base \
                      gstreamer1.0-plugins-good \
                      gstreamer1.0-plugins-bad \
                      gstreamer1.0-libav \
                      gstreamer1.0-tools \
                      libgstreamer-plugins-base1.0-dev \
                      xvfb \
                      ffmpeg
                    export DISPLAY=:99.0
                    Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
                    sleep 2
                    echo "DISPLAY=:99.0" >> $GITHUB_ENV

            -   name: Cache SonarQube packages
                if: matrix.os == 'ubuntu-latest'
                uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
                with:
                    path: ~/.sonar/cache
                    key: ${{ runner.os }}-sonar
                    restore-keys: ${{ runner.os }}-sonar

            -   name: Cache Gradle packages
                uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
                with:
                    path: |
                        ~/.gradle/caches
                        ~/.gradle/wrapper
                    key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
                    restore-keys: |
                        ${{ runner.os }}-gradle-

            -   name: Build with Virtual Display (Linux)
                if: matrix.os == 'ubuntu-latest'
                run: ./gradlew check -PexcludeAudioHardware=true

            -   name: Build (Windows, skip Linux-only and playback tests)
                if: matrix.os == 'windows-latest'
                # See branch-pr.yml for the rationale: windows-latest runners ship without a
                # SourceDataLine-compatible audio output device.
                run: ./gradlew check -PexcludeLinuxOnly=true -PexcludePosixOnly=true -PincludeWindowsOnly=true -PexcludeAudioHardware=true

            -   name: Upload coverage to Codecov
                if: matrix.os == 'ubuntu-latest'
                uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
                env:
                    CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
                with:
                    files: build/reports/jacoco/testCodeCoverageReport/testCodeCoverageReport.xml

            -   name: Upload test results to Codecov
                if: "!cancelled()"
                uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1.2.1
                with:
                    token: ${{ secrets.CODECOV_TOKEN }}
                    files: "**/build/test-results/test/*.xml"
                    flags: ${{ matrix.os }}

            -   name: Upload Artifacts
                if: matrix.os == 'ubuntu-latest'
                uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
                with:
                    name: release-build-libs
                    path: build/libs
                    retention-days: 14
                    overwrite: true

            -   name: SonarQube Scan
                if: matrix.os == 'ubuntu-latest'
                env:
                    SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
                run: ./gradlew sonar --info
