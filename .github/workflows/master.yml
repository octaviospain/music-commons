name: master build

on:
    push:
        branches:
            - main
        paths-ignore:
            - "**.md"
            - '.gitignore'
            - 'docs/**'

jobs:
    build-analyze:
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, windows-latest]

        steps:
            -   uses: actions/checkout@v4
                with:
                    fetch-depth: 0

            -   name: Set up JDK 21
                uses: actions/setup-java@v4
                with:
                    java-version: 21
                    distribution: 'liberica'
                    java-package: 'jdk+fx'

            -   name: Install dependencies (Linux)
                if: matrix.os == 'ubuntu-latest'
                run: |
                    sudo apt-get update
                    sudo apt-get install -y \
                      libgstreamer1.0-0 \
                      gstreamer1.0-plugins-base \
                      gstreamer1.0-plugins-good \
                      gstreamer1.0-plugins-bad \
                      gstreamer1.0-libav \
                      gstreamer1.0-tools \
                      libgstreamer-plugins-base1.0-dev \
                      xvfb \
                      ffmpeg
                    export DISPLAY=:99.0
                    Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
                    sleep 2
                    echo "DISPLAY=:99.0" >> $GITHUB_ENV

            -   name: Cache SonarQube packages
                if: matrix.os == 'ubuntu-latest'
                uses: actions/cache@v4
                with:
                    path: ~/.sonar/cache
                    key: ${{ runner.os }}-sonar
                    restore-keys: ${{ runner.os }}-sonar

            -   name: Cache Gradle packages
                uses: actions/cache@v4
                with:
                    path: |
                        ~/.gradle/caches
                        ~/.gradle/wrapper
                    key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
                    restore-keys: |
                        ${{ runner.os }}-gradle-

            -   name: Build with Virtual Display (Linux)
                if: matrix.os == 'ubuntu-latest'
                run: ./gradlew check -PexcludePlaybackTests=true

            -   name: Build (Windows, skip Linux-only and playback tests)
                if: matrix.os == 'windows-latest'
                run: ./gradlew check -PexcludeLinuxOnly=true -PexcludePosixOnly=true -PincludeWindowsOnly=true

            -   name: Upload coverage to Codecov
                if: matrix.os == 'ubuntu-latest'
                uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
                env:
                    CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
                with:
                    files: build/reports/jacoco/testCodeCoverageReport/testCodeCoverageReport.xml

            -   name: Upload test results to Codecov
                if: "!cancelled()"
                uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
                with:
                    token: ${{ secrets.CODECOV_TOKEN }}
                    report_type: test_results
                    files: "**/build/test-results/test/*.xml"
                    flags: ${{ matrix.os }}

            -   name: Upload Artifacts
                if: matrix.os == 'ubuntu-latest'
                uses: actions/upload-artifact@v4
                with:
                    name: release-build-libs
                    path: build/libs
                    retention-days: 14
                    overwrite: true

            -   name: SonarQube Scan
                if: matrix.os == 'ubuntu-latest'
                env:
                    SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
                run: ./gradlew sonar --info
