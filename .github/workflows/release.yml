name: Manual Release to Maven Central

on:
    workflow_dispatch:
        inputs:
            version-increment:
                description: 'Version increment strategy'
                required: true
                default: 'incrementMinor'
                type: choice
                options:
                    - incrementPatch
                    - incrementMinor
                    - incrementMajor

jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            -   uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
                with:
                    fetch-depth: 0
                    persist-credentials: false

            -   name: Set up JDK 21
                uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
                with:
                    java-version: 21
                    distribution: 'liberica'
                    java-package: 'jdk+fx'

            -   name: Install dependencies
                run: |
                    sudo apt-get update
                    sudo apt-get install -y \
                      libgstreamer1.0-0 \
                      gstreamer1.0-plugins-base \
                      gstreamer1.0-plugins-good \
                      gstreamer1.0-plugins-bad \
                      gstreamer1.0-libav \
                      gstreamer1.0-tools \
                      libgstreamer-plugins-base1.0-dev \
                      xvfb \
                      ffmpeg
                    export DISPLAY=:99.0
                    Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
                    sleep 2
                    echo "DISPLAY=:99.0" >> $GITHUB_ENV

            -   name: Cache SonarQube packages
                uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
                with:
                    path: ~/.sonar/cache
                    key: ${{ runner.os }}-sonar
                    restore-keys: ${{ runner.os }}-sonar

            -   name: Cache Gradle packages
                uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
                with:
                    path: |
                        ~/.gradle/caches
                        ~/.gradle/wrapper
                    key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
                    restore-keys: |
                        ${{ runner.os }}-gradle-

            -   name: Build with Gradle and Virtual Display
                run: ./gradlew build -PexcludeAudioHardware=true -PversionIncrement=${{ inputs.version-increment }}

            -   name: Generate CycloneDX SBOM
                # --no-parallel works around the cyclonedx-gradle-plugin parallel-resolution
                # error: "Resolution of the configuration ':<module>:runtimeClasspath' was attempted
                # without an exclusive lock."
                run: ./gradlew cyclonedxBom --no-parallel -PversionIncrement=${{ inputs.version-increment }}

            -   name: Upload SBOM artifact
                uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
                with:
                    name: music-commons-sbom-cyclonedx
                    path: build/reports/cyclonedx/bom.json
                    if-no-files-found: error

            -   name: Release
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                    ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
                    ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
                    ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
                    ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
                    ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
                run: |
                    git config user.email "github-actions@github.com"
                    git config user.name "github-actions"
                    git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
                    ./gradlew createRelease -PversionIncrement=${{ inputs.version-increment }}
                    git push --tags origin HEAD
                    ./gradlew publishToMavenCentral -PversionIncrement=${{ inputs.version-increment }}
                    echo "Release completed ${{ steps.release.outputs.released-version }}"

            -   name: Create draft GitHub Release with SBOM
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                run: |
                    RELEASE_TAG=$(git describe --tags --abbrev=0)
                    gh release create "$RELEASE_TAG" \
                      build/reports/cyclonedx/bom.json \
                      --draft \
                      --generate-notes \
                      --title "$RELEASE_TAG" \
                      --repo ${{ github.repository }}
