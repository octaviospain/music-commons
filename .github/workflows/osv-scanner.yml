name: OSV-Scanner

on:
    schedule:
        # Mondays 06:00 UTC — matches lirp cadence.
        -   cron: '0 6 * * 1'
    workflow_dispatch:

permissions:
    contents: read
    security-events: write
    actions: read

jobs:
    scan:
        uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
            scan-args: |-
                --recursive
                ./
            upload-sarif: true
