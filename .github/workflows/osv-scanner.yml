name: OSV-Scanner

on:
    schedule:
        # Mondays 06:00 UTC
        -   cron: '0 6 * * 1'
    workflow_dispatch:

permissions:
    contents: read
    security-events: write
    actions: read

env:
    # Pin the OSV-Scanner CLI version. Bump together with renovate-tracked
    # action SHAs; the binary itself is fetched over HTTPS from GitHub Releases.
    OSV_SCANNER_VERSION: v2.3.8

jobs:
    scan:
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            -   name: Set up JDK 21
                uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
                with:
                    java-version: 21
                    distribution: 'zulu'
                    java-package: 'jdk+fx'

            -   name: Cache Gradle packages
                uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
                with:
                    path: |
                        ~/.gradle/caches
                        ~/.gradle/wrapper
                    key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
                    restore-keys: |
                        ${{ runner.os }}-gradle-

            # The aggregated SBOM is scoped to runtimeClasspath via
            # `tasks.cyclonedxDirectBom { includeConfigs = ['runtimeClasspath'] }`
            # in build.gradle. Scanning it instead of the repo avoids false
            # positives from plugin-classpath transitives (Sonar/JGit/etc.) that
            # live only in the Gradle daemon and never ship to consumers.
            -   name: Generate CycloneDX SBOM
                run: ./gradlew cyclonedxBom --no-parallel

            -   name: Install OSV-Scanner CLI
                # Verify the downloaded binary against the upstream-published
                # SHA-256 sums before executing it. Fetching SHA256SUMS over
                # the same HTTPS channel matches Google's own installation guide;
                # a future hardening step could pin the digest inline.
                run: |
                    set -euo pipefail
                    base="https://github.com/google/osv-scanner/releases/download/${OSV_SCANNER_VERSION}"
                    # Save under the canonical asset filename so `sha256sum --check`
                    # can match the entry in osv-scanner_SHA256SUMS.
                    curl --proto '=https' --tlsv1.2 -fsSL \
                        "${base}/osv-scanner_linux_amd64" -o /tmp/osv-scanner_linux_amd64
                    curl --proto '=https' --tlsv1.2 -fsSL \
                        "${base}/osv-scanner_SHA256SUMS" -o /tmp/osv-scanner_SHA256SUMS
                    ( cd /tmp && grep ' osv-scanner_linux_amd64$' osv-scanner_SHA256SUMS \
                        | sha256sum --check --strict - )
                    chmod +x /tmp/osv-scanner_linux_amd64
                    /tmp/osv-scanner_linux_amd64 --version

            -   name: Scan SBOM
                # OSV-Scanner exits non-zero on findings; keep going so the
                # SARIF still gets uploaded to Code Scanning.
                continue-on-error: true
                run: |
                    /tmp/osv-scanner_linux_amd64 \
                        --sbom=build/reports/cyclonedx/bom.json \
                        --format=sarif \
                        --output=results.sarif

            -   name: Upload SARIF to Code Scanning
                uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
                with:
                    sarif_file: results.sarif

    # Advisory job: surfaces build-time/plugin-classpath transitive vulnerabilities
    # (bcpkix, bcpg, jackson, plexus, assertj, etc.) for visibility on dev/CI
    # machines without failing the gate. Both scan and upload steps use
    # continue-on-error so this job is strictly non-blocking.
    scan-build-tooling:
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            -   name: Install OSV-Scanner CLI
                run: |
                    set -euo pipefail
                    base="https://github.com/google/osv-scanner/releases/download/${OSV_SCANNER_VERSION}"
                    curl --proto '=https' --tlsv1.2 -fsSL \
                        "${base}/osv-scanner_linux_amd64" -o /tmp/osv-scanner_linux_amd64
                    curl --proto '=https' --tlsv1.2 -fsSL \
                        "${base}/osv-scanner_SHA256SUMS" -o /tmp/osv-scanner_SHA256SUMS
                    ( cd /tmp && grep ' osv-scanner_linux_amd64$' osv-scanner_SHA256SUMS \
                        | sha256sum --check --strict - )
                    chmod +x /tmp/osv-scanner_linux_amd64
                    /tmp/osv-scanner_linux_amd64 --version

            -   name: Scan build tooling
                # Scans gradle/verification-metadata.xml to surface build-time/plugin-classpath
                # transitive vulnerabilities (bcpkix/bcpg/jackson/plexus/assertj) that never
                # ship to consumers. Advisory only — findings are visible in Code Scanning
                # under the 'build-tooling' category without blocking the merge gate.
                continue-on-error: true
                run: |
                    /tmp/osv-scanner_linux_amd64 \
                        --lockfile=gradle/verification-metadata.xml \
                        --format=sarif \
                        --output=results-build-tooling.sarif

            -   name: Upload SARIF to Code Scanning
                continue-on-error: true
                uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
                with:
                    sarif_file: results-build-tooling.sarif
                    category: build-tooling
