name: branch / PR build

on:
    push:
        branches-ignore:
            - main
        paths-ignore:
            - "**.md"
            - '.gitignore'
            - 'docs/**'
    pull_request:
        types: [opened, synchronize, reopened]
        branches:
            - main
        paths-ignore:
            - "**.md"
            - '.gitignore'
            - 'docs/**'

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
    cancel-in-progress: true

jobs:
    build-and-test:
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, windows-latest]

        steps:
            -   uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
                with:
                    fetch-depth: 0

            -   name: Dependency Review
                if: github.event_name == 'pull_request'
                uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
                with:
                    fail-on-severity: high
                    comment-summary-in-pr: on-failure

            -   name: Set up JDK 21
                uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
                with:
                    java-version: 21
                    distribution: 'liberica'
                    java-package: 'jdk+fx'

            -   name: Install dependencies (Linux)
                if: matrix.os == 'ubuntu-latest'
                run: |
                    sudo apt-get update
                    sudo apt-get install -y \
                      libgstreamer1.0-0 \
                      gstreamer1.0-plugins-base \
                      gstreamer1.0-plugins-good \
                      gstreamer1.0-plugins-bad \
                      gstreamer1.0-libav \
                      gstreamer1.0-tools \
                      libgstreamer-plugins-base1.0-dev \
                      xvfb \
                      ffmpeg
                    export DISPLAY=:99.0
                    Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
                    sleep 2
                    echo "DISPLAY=:99.0" >> $GITHUB_ENV

            -   name: Cache Gradle packages
                uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
                with:
                    path: |
                        ~/.gradle/caches
                        ~/.gradle/wrapper
                    key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
                    restore-keys: |
                        ${{ runner.os }}-gradle-

            -   name: Build with and Virtual Display (Linux)
                if: matrix.os == 'ubuntu-latest'
                run: ./gradlew check -PexcludePlaybackTests=true

            -   name: Build (Windows, skip Linux-only and playback tests)
                if: matrix.os == 'windows-latest'
                # windows-latest GitHub runners ship without a usable audio output device:
                # AudioSystem.getLine(SourceDataLine.class, format) throws IllegalArgumentException
                # ("No line matching interface SourceDataLine supporting format … is supported")
                # for every PCM_SIGNED 44100 Hz / 16-bit / stereo combo, regardless of endianness.
                # That makes any test that opens a real line fail on the runner, so we skip them
                # via the requires-playback tag.
                run: ./gradlew check -PexcludeLinuxOnly=true -PexcludePosixOnly=true -PincludeWindowsOnly=true -PexcludePlaybackTests=true

            -   name: Upload coverage to Codecov
                if: matrix.os == 'ubuntu-latest' && !env.ACT
                uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
                env:
                    CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
                with:
                    files: build/reports/jacoco/testCodeCoverageReport/testCodeCoverageReport.xml

            -   name: Upload test results to Codecov
                if: "!cancelled() && !env.ACT"
                uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1
                with:
                    token: ${{ secrets.CODECOV_TOKEN }}
                    files: "**/build/test-results/test/*.xml"
                    flags: ${{ matrix.os }}
