name: branch / PR build

on:
    push:
        branches-ignore:
            - main
        paths-ignore:
            - "**.md"
            - '.gitignore'
            - 'docs/**'

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
    cancel-in-progress: true

jobs:
    build-and-test:
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, windows-latest, macos-latest]

        steps:
            -   uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
                with:
                    fetch-depth: 0

            -   name: Set up JDK 21
                uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
                with:
                    java-version: 21
                    distribution: 'liberica'
                    java-package: 'jdk+fx'

            -   name: Install dependencies (Linux)
                if: matrix.os == 'ubuntu-latest'
                run: |
                    sudo apt-get update
                    sudo apt-get install -y \
                      libgstreamer1.0-0 \
                      gstreamer1.0-plugins-base \
                      gstreamer1.0-plugins-good \
                      gstreamer1.0-plugins-bad \
                      gstreamer1.0-libav \
                      gstreamer1.0-tools \
                      libgstreamer-plugins-base1.0-dev \
                      xvfb \
                      ffmpeg
                    export DISPLAY=:99.0
                    Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
                    sleep 2
                    echo "DISPLAY=:99.0" >> $GITHUB_ENV

            -   name: Cache Gradle packages
                uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
                with:
                    path: |
                        ~/.gradle/caches
                        ~/.gradle/wrapper
                    key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
                    restore-keys: |
                        ${{ runner.os }}-gradle-

            -   name: Build with Virtual Display (Linux)
                if: matrix.os == 'ubuntu-latest'
                run: ./gradlew check dokkaGenerate -PexcludeAudioHardware=true

            -   name: Build (Windows, skip Linux-only and audio-hardware tests)
                if: matrix.os == 'windows-latest'
                # windows-latest GitHub runners ship without a usable audio output device:
                # AudioSystem.getLine(SourceDataLine.class, format) throws IllegalArgumentException
                # ("No line matching interface SourceDataLine supporting format … is supported")
                # for every PCM_SIGNED 44100 Hz / 16-bit / stereo combo, regardless of endianness.
                # That makes any test that opens a real line fail on the runner, so we skip them
                # via the audio-hardware tag.
                run: ./gradlew check -PexcludeLinuxOnly=true -PexcludePosixOnly=true -PincludeWindowsOnly=true -PexcludeAudioHardware=true

            -   name: Build (macOS, skip Linux-only and audio-hardware tests)
                if: matrix.os == 'macos-latest'
                # macOS needs no gstreamer/Xvfb: JavaFX tests run under Monocle headless (bundled
                # in Liberica jdk+fx) and audio decode is pure-Java JavaSound SPI.
                run: ./gradlew check -PexcludeAudioHardware=true -PexcludeLinuxOnly=true

            -   name: Cross-check verification metadata against Maven Central
                # Re-resolves every dependency with --refresh-dependencies (bypasses the
                # cache restored above) and writes a fresh dependency-verification report
                # to verification-metadata.dryrun.xml. Two outcomes:
                #   1. Gradle's own dependency-verification rejects a freshly-downloaded
                #      artifact whose SHA does not match the committed metadata — fails here.
                #   2. The dry-run output diverges from the committed file (new components,
                #      reordering, missing entries) — flagged by the diff below.
                # Together these prove the committed metadata matches what Maven Central
                # currently serves, defeating a poisoned-local-cache attack at regen time.
                shell: bash
                run: |
                    ./gradlew --write-verification-metadata sha256 build cyclonedxBom \
                        --dry-run --no-parallel --refresh-dependencies
                    if ! diff -q gradle/verification-metadata.xml gradle/verification-metadata.dryrun.xml > /dev/null; then
                        echo "::error::verification-metadata.xml diverges from Maven Central. Regenerate locally and recommit."
                        diff gradle/verification-metadata.xml gradle/verification-metadata.dryrun.xml || true
                        exit 1
                    fi
                    rm gradle/verification-metadata.dryrun.xml

            -   name: Upload coverage to Codecov
                if: matrix.os == 'ubuntu-latest' && !env.ACT
                uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
                env:
                    CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
                with:
                    files: build/reports/jacoco/testCodeCoverageReport/testCodeCoverageReport.xml

            -   name: Upload test results to Codecov
                if: "!cancelled() && !env.ACT"
                uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1.2.1
                with:
                    token: ${{ secrets.CODECOV_TOKEN }}
                    files: "**/build/test-results/test/*.xml"
                    flags: ${{ matrix.os }}
